name: Daily Tech Brief Auto-Update Pipeline

on:
  schedule:
    # Runs everyday at 22:30 UTC as requested in your document specification mapping
    - cron: '30 22 * * *'
  workflow_dispatch: # Allows you to trigger this pipeline manually from the GitHub website UI

jobs:
  update-brief:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out repository code
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    # 2. Setup Node.js run execution environment
    - name: Setup Node.js Engine
      uses: actions/setup-node@v4
      with:
        node-node-version: 20
        cache: 'npm'
        cache-dependency-path: './backend/package.json'

    # 3. Install backend dependencies cleanly
    - name: Install Runtime Dependencies
      run: |
        cd backend
        npm ci

    # 4. Run the compilation automation pipeline
    - name: Run News Generation Pipeline via Groq Engine
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      run: |
        cd backend
        node scripts/fetchAndSummarize.js

    # 5. Automatically commit the newly generated today.json file to your repo
    - name: Commit and Push Storage System Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add backend/content/generated/today.json
        
        # Check if today.json actually has changes to prevent empty commit crashes
        if git diff-index --quiet HEAD; then
          echo "No new updates found for today.json. Skipping push."
        else
          git commit -m "chore(data): auto-update daily tech brief content [skip ci]"
          git push
        fi